<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王二.skill 介绍动画</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'SimSun', 'STSong', serif;
            overflow: hidden;
            width: 800px;
            height: 450px;
            margin: 0;
            padding: 0;
        }

        #root {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        .title {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
            text-align: center;
        }

        .subtitle {
            font-size: 24px;
            color: #ccc;
            text-align: center;
            max-width: 600px;
            line-height: 1.4;
            margin-bottom: 40px;
        }

        .mind-model {
            font-size: 28px;
            color: #fff;
            margin: 15px 0;
            text-align: center;
            opacity: 0;
        }

        .mind-model.highlight {
            color: #ff4444;
        }

        .quote {
            font-size: 22px;
            color: #ccc;
            text-align: center;
            max-width: 700px;
            line-height: 1.6;
            margin: 30px 0;
            font-style: italic;
            opacity: 0;
        }

        .ending {
            font-size: 28px;
            color: #ff4444;
            text-align: center;
            margin-top: 30px;
            opacity: 0;
        }

        .red-dot {
            color: #ff4444;
        }

        .fade-in {
            animation: fadeIn 1s ease forwards;
        }

        .fade-out {
            animation: fadeOut 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        .typewriter {
            overflow: hidden;
            border-right: 2px solid #ff4444;
            white-space: nowrap;
            margin: 0 auto;
            animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #ff4444 }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function WangErAnimation() {
            const [currentStep, setCurrentStep] = useState(0);
            const [fadeStates, setFadeStates] = useState({
                title: 0,
                subtitle: 0,
                mindModels: Array(7).fill(0),
                quote: 0,
                ending: 0
            });

            const mindModels = [
                "荒诞逻辑对抗",
                "性爱政治反抗",
                "边缘生存策略",
                "语言游戏消解",
                "知识分子自我启蒙",
                "黑色幽默防御",
                "随机性接受"
            ];

            const quote = "我插队时一天干12小时，但那是在地里，身体累心不累。你们现在坐在电脑前12小时，身体没动心先死了。";
            const ending = "从'荒诞逻辑'到'边缘生存'的反抗之路";

            useEffect(() => {
                // 设置 ready 信号，用于视频录制
                requestAnimationFrame(() => { window.__ready = true; });

                const totalDuration = 15000; // 15秒
                const steps = [
                    { step: 0, time: 0, action: () => setFadeStates(s => ({...s, title: 1})) }, // 标题
                    { step: 1, time: 2000, action: () => setFadeStates(s => ({...s, subtitle: 1})) }, // 副标题
                    // 心智模型逐个显示
                    { step: 2, time: 4000, action: () => {
                        const newModels = [...fadeStates.mindModels];
                        newModels[0] = 1;
                        setFadeStates(s => ({...s, mindModels: newModels}));
                    }},
                    { step: 3, time: 5000, action: () => {
                        const newModels = [...fadeStates.mindModels];
                        newModels[1] = 1;
                        setFadeStates(s => ({...s, mindModels: newModels}));
                    }},
                    { step: 4, time: 6000, action: () => {
                        const newModels = [...fadeStates.mindModels];
                        newModels[2] = 1;
                        setFadeStates(s => ({...s, mindModels: newModels}));
                    }},
                    { step: 5, time: 7000, action: () => {
                        const newModels = [...fadeStates.mindModels];
                        newModels[3] = 1;
                        setFadeStates(s => ({...s, mindModels: newModels}));
                    }},
                    { step: 6, time: 8000, action: () => {
                        const newModels = [...fadeStates.mindModels];
                        newModels[4] = 1;
                        setFadeStates(s => ({...s, mindModels: newModels}));
                    }},
                    { step: 7, time: 9000, action: () => {
                        const newModels = [...fadeStates.mindModels];
                        newModels[5] = 1;
                        setFadeStates(s => ({...s, mindModels: newModels}));
                    }},
                    { step: 8, time: 10000, action: () => {
                        const newModels = [...fadeStates.mindModels];
                        newModels[6] = 1;
                        setFadeStates(s => ({...s, mindModels: newModels}));
                    }},
                    { step: 9, time: 11000, action: () => setFadeStates(s => ({...s, quote: 1})) }, // 引文
                    { step: 10, time: 13000, action: () => setFadeStates(s => ({...s, ending: 1})) }, // 结束语
                    { step: 11, time: 15000, action: () => {
                        // 循环：重置所有状态（仅在非录制模式下）
                        if (!window.__recording) {
                            setFadeStates({
                                title: 0,
                                subtitle: 0,
                                mindModels: Array(7).fill(0),
                                quote: 0,
                                ending: 0
                            });
                            setCurrentStep(0);
                        }
                    }}
                ];

                const interval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const currentStep = steps.findIndex(step => step.time > elapsed) - 1;

                    if (currentStep >= 0 && currentStep < steps.length) {
                        if (currentStep !== prevStep.current) {
                            steps[currentStep]?.action();
                            prevStep.current = currentStep;
                        }
                    }
                }, 50);

                const startTime = Date.now();
                const prevStep = useRef(-1);

                return () => clearInterval(interval);
            }, []);

            return (
                <div className="container">
                    {/* 标题 */}
                    <div
                        className="title"
                        style={{
                            opacity: fadeStates.title,
                            transform: `translateY(${fadeStates.title ? 0 : 20}px)`,
                            transition: 'opacity 1s ease, transform 1s ease'
                        }}
                    >
                        王二<span className="red-dot">.</span>skill
                    </div>

                    {/* 副标题 */}
                    <div
                        className="subtitle"
                        style={{
                            opacity: fadeStates.subtitle,
                            transform: `translateY(${fadeStates.subtitle ? 0 : 20}px)`,
                            transition: 'opacity 1s ease, transform 1s ease'
                        }}
                    >
                        王小波作品中王二角色的思维操作系统
                    </div>

                    {/* 心智模型 */}
                    <div style={{ margin: '20px 0' }}>
                        {mindModels.map((model, index) => (
                            <div
                                key={index}
                                className={`mind-model ${index === 0 || index === 2 || index === 6 ? 'highlight' : ''}`}
                                style={{
                                    opacity: fadeStates.mindModels[index],
                                    transform: `translateY(${fadeStates.mindModels[index] ? 0 : 10}px)`,
                                    transition: 'opacity 0.8s ease, transform 0.8s ease',
                                    transitionDelay: `${index * 100}ms`
                                }}
                            >
                                {model}
                            </div>
                        ))}
                    </div>

                    {/* 引文 */}
                    <div
                        className="quote"
                        style={{
                            opacity: fadeStates.quote,
                            transform: `translateY(${fadeStates.quote ? 0 : 20}px)`,
                            transition: 'opacity 1s ease, transform 1s ease'
                        }}
                    >
                        "{quote}"
                    </div>

                    {/* 结束语 */}
                    <div
                        className="ending"
                        style={{
                            opacity: fadeStates.ending,
                            transform: `translateY(${fadeStates.ending ? 0 : 20}px)`,
                            transition: 'opacity 1s ease, transform 1s ease'
                        }}
                    >
                        {ending}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<WangErAnimation />, document.getElementById('root'));
    </script>
</body>
</html>
