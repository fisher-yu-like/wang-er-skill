<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王二.skill 介绍动画</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            overflow: hidden;
            width: 800px;
            height: 450px;
            margin: 0;
            padding: 0;
        }

        #root {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 自定义字体 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap');

        .title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 72px;
            font-weight: normal;
            color: #fff;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .title-dot {
            color: #ff4444;
        }

        .subtitle {
            font-family: 'Noto Serif SC', serif;
            font-size: 24px;
            color: #ccc;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 700px;
            line-height: 1.4;
        }

        .mind-model-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .mind-model {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            color: #fff;
            opacity: 0;
            transform: translateY(20px);
        }

        .mind-model.highlight {
            color: #ff4444;
            font-weight: 700;
        }

        .quote-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 750px;
            padding: 0 20px;
        }

        .quote {
            font-family: 'Noto Serif SC', serif;
            font-size: 22px;
            color: #ccc;
            line-height: 1.6;
            text-align: center;
            font-style: italic;
            opacity: 0;
            transform: translateY(20px);
        }

        .quote-quote {
            color: #ff4444;
            font-size: 32px;
            line-height: 0;
            vertical-align: middle;
        }

        .ending {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            color: #ff4444;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
        }

        .fade-in-up {
            opacity: 1 !important;
            transform: translateY(0) !important;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .fade-out {
            opacity: 0 !important;
            transform: translateY(-20px) !important;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 导入动画系统
        ${function() {
            // 这里将插入 animations.jsx 的内容
            // 但由于篇幅限制，我们直接引用 window.Animations
            // 在实际文件中，这里应该包含完整的 animations.jsx 内容
        }}

        // 复制 animations.jsx 的内容
        (function() {
          const { createContext, useContext, useState, useEffect, useRef, useCallback } = React;

          const TimeContext = createContext({ time: 0, duration: 10, playing: false });
          const SpriteContext = createContext(null);

          const Easing = {
            linear: t => t,
            easeIn: t => t * t,
            easeOut: t => 1 - (1 - t) * (1 - t),
            easeInOut: t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
            expoOut: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
            overshoot: t => {
              const c1 = 1.70158, c3 = c1 + 1;
              return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
            },
            spring: t => {
              const c = (2 * Math.PI) / 3;
              return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c) + 1;
            },
            anticipation: t => {
              if (t < 0.2) return -0.3 * (t / 0.2) * (t / 0.2);
              const adjusted = (t - 0.2) / 0.8;
              return -0.012 + 1.012 * adjusted * adjusted * (3 - 2 * adjusted);
            },
          };

          function interpolate(t, input, output, easing) {
            const [inStart, inEnd] = input;
            const [outStart, outEnd] = output;

            if (t <= inStart) return outStart;
            if (t >= inEnd) return outEnd;

            let progress = (t - inStart) / (inEnd - inStart);
            if (easing) {
              progress = easing(progress);
            }

            return outStart + (outEnd - outStart) * progress;
          }

          function useTime() {
            const ctx = useContext(TimeContext);
            return ctx.time;
          }

          function useSprite() {
            const sprite = useContext(SpriteContext);
            if (!sprite) {
              return { t: 0, elapsed: 0, duration: 0 };
            }
            return sprite;
          }

          const stageStyles = {
            wrapper: {
              position: 'fixed',
              inset: 0,
              background: '#000',
              display: 'flex',
              flexDirection: 'column',
              fontFamily: '-apple-system, sans-serif',
            },
            stageHolder: {
              flex: 1,
              position: 'relative',
              overflow: 'hidden',
            },
            canvas: {
              position: 'absolute',
              top: '50%',
              left: '50%',
              transformOrigin: 'center center',
              background: '#111',
              overflow: 'hidden',
            },
            controls: {
              position: 'fixed',
              bottom: 0,
              left: 0,
              right: 0,
              background: 'rgba(0, 0, 0, 0.8)',
              backdropFilter: 'blur(10px)',
              padding: '12px 20px',
              display: 'flex',
              alignItems: 'center',
              gap: 16,
              color: '#fff',
              fontSize: 12,
              zIndex: 100,
            },
            button: {
              background: 'none',
              border: '1px solid rgba(255,255,255,0.3)',
              color: '#fff',
              padding: '6px 14px',
              borderRadius: 4,
              cursor: 'pointer',
              fontSize: 12,
            },
            timeDisplay: {
              fontFamily: 'ui-monospace, monospace',
              fontVariantNumeric: 'tabular-nums',
              minWidth: 90,
            },
            scrubber: {
              flex: 1,
              height: 4,
              background: 'rgba(255,255,255,0.2)',
              borderRadius: 2,
              position: 'relative',
              cursor: 'pointer',
            },
            scrubberFill: {
              position: 'absolute',
              top: 0,
              left: 0,
              height: '100%',
              background: '#fff',
              borderRadius: 2,
              pointerEvents: 'none',
            },
            scrubberHandle: {
              position: 'absolute',
              top: '50%',
              width: 12,
              height: 12,
              background: '#fff',
              borderRadius: '50%',
              transform: 'translate(-50%, -50%)',
              pointerEvents: 'none',
            },
          };

          function Stage({ duration = 10, width = 1920, height = 1080, fps = 60, loop = true, children, bgColor = '#fff' }) {
            const [time, setTime] = useState(0);
            const [playing, setPlaying] = useState(true);
            const [scale, setScale] = useState(1);
            const rafRef = useRef(null);
            const startTimeRef = useRef(performance.now());
            const canvasRef = useRef(null);

            const effectiveLoop = (typeof window !== 'undefined' && window.__recording) ? false : loop;

            useEffect(() => {
              function updateScale() {
                const vw = window.innerWidth;
                const vh = window.innerHeight - 56;
                const s = Math.min(vw / width, vh / height);
                setScale(s);
              }
              updateScale();
              window.addEventListener('resize', updateScale);
              return () => window.removeEventListener('resize', updateScale);
            }, [width, height]);

            useEffect(() => {
              if (!playing) return;
              let cancelled = false;
              let last = null;

              function tick(now) {
                if (cancelled) return;
                if (last === null) {
                  last = now;
                  if (typeof window !== 'undefined') window.__ready = true;
                }
                const delta = (now - last) / 1000;
                last = now;
                setTime(prev => {
                  const next = prev + delta;
                  if (next >= duration) {
                    return effectiveLoop ? 0 : duration - 0.001;
                  }
                  return next;
                });
                rafRef.current = requestAnimationFrame(tick);
              }

              const startAfterFonts = () => {
                if (cancelled) return;
                rafRef.current = requestAnimationFrame(tick);
              };
              if (typeof document !== 'undefined' && document.fonts && document.fonts.ready) {
                document.fonts.ready.then(startAfterFonts);
              } else {
                startAfterFonts();
              }

              return () => {
                cancelled = true;
                cancelAnimationFrame(rafRef.current);
              };
            }, [playing, duration, effectiveLoop]);

            const handleScrub = useCallback((e) => {
              const rect = e.currentTarget.getBoundingClientRect();
              const ratio = (e.clientX - rect.left) / rect.width;
              setTime(Math.max(0, Math.min(duration, ratio * duration)));
            }, [duration]);

            const handleSeek = useCallback((e) => {
              handleScrub(e);
              setPlaying(false);
            }, [handleScrub]);

            const progress = time / duration;

            const ctx = {
              time,
              duration,
              playing,
              setPlaying,
              setTime,
            };

            const canvasStyle = {
              ...stageStyles.canvas,
              width,
              height,
              background: bgColor,
              transform: `translate(-50%, -50%) scale(${scale})`,
            };

            return (
              <TimeContext.Provider value={ctx}>
                <div style={stageStyles.wrapper}>
                  <div style={stageStyles.stageHolder}>
                    <div ref={canvasRef} style={canvasStyle}>
                      {children}
                    </div>
                  </div>

                  <div style={stageStyles.controls}>
                    <button
                      style={stageStyles.button}
                      onClick={() => setPlaying(p => !p)}
                    >
                      {playing ? '⏸ 暂停' : '▶ 播放'}
                    </button>

                    <button
                      style={stageStyles.button}
                      onClick={() => setTime(0)}
                    >
                      ⏮ 开始
                    </button>

                    <div style={stageStyles.timeDisplay}>
                      {time.toFixed(2)}s / {duration.toFixed(2)}s
                    </div>

                    <div style={stageStyles.scrubber} onMouseDown={handleSeek}>
                      <div style={{ ...stageStyles.scrubberFill, width: `${progress * 100}%` }} />
                      <div style={{ ...stageStyles.scrubberHandle, left: `${progress * 100}%` }} />
                    </div>
                  </div>
                </div>
              </TimeContext.Provider>
            );
          }

          function Sprite({ start = 0, end, children, style }) {
            const { time } = useContext(TimeContext);
            const actualEnd = end == null ? Infinity : end;

            if (time < start || time >= actualEnd) {
              return null;
            }

            const duration = actualEnd - start;
            const elapsed = time - start;
            const t = duration === 0 ? 1 : Math.max(0, Math.min(1, elapsed / duration));

            const spriteValue = { t, elapsed, duration, start, end: actualEnd };

            return (
              <SpriteContext.Provider value={spriteValue}>
                <div style={{ position: 'absolute', inset: 0, ...style }}>
                  {children}
                </div>
              </SpriteContext.Provider>
            );
          }

          if (typeof window !== 'undefined') {
            window.Animations = {
              Stage,
              Sprite,
              useTime,
              useSprite,
              Easing,
              interpolate,
            };
          }
        })();

        // 动画组件
        const { Stage, Sprite, useTime, useSprite, Easing, interpolate } = window.Animations;

        function Title() {
            const sprite = useSprite();
            const opacity = interpolate(sprite.t, [0, 0.3, 0.7, 1], [0, 1, 1, 0], Easing.easeInOut);
            const scale = interpolate(sprite.t, [0, 0.3, 0.7, 1], [0.8, 1, 1, 0.8], Easing.easeOut);

            return (
                <div style={{
                    position: 'absolute',
                    top: '50%',
                    left: '50%',
                    transform: `translate(-50%, -50%) scale(${scale})`,
                    opacity,
                    transition: 'opacity 0.5s ease, transform 0.5s ease'
                }}>
                    <div className="title">
                        王二<span className="title-dot">.</span>skill
                    </div>
                </div>
            );
        }

        function Subtitle() {
            const sprite = useSprite();
            const opacity = interpolate(sprite.t, [0, 0.3, 0.7, 1], [0, 1, 1, 0], Easing.easeInOut);
            const y = interpolate(sprite.t, [0, 0.3, 0.7, 1], [20, 0, 0, -20], Easing.easeOut);

            return (
                <div style={{
                    position: 'absolute',
                    top: '50%',
                    left: '50%',
                    transform: `translate(-50%, -50%) translateY(${y}px)`,
                    opacity,
                    transition: 'opacity 0.5s ease, transform 0.5s ease'
                }}>
                    <div className="subtitle">
                        王小波作品中王二角色的思维操作系统
                    </div>
                </div>
            );
        }

        function MindModels() {
            const sprite = useSprite();
            const models = [
                "荒诞逻辑对抗",
                "性爱政治反抗",
                "边缘生存策略",
                "语言游戏消解",
                "知识分子自我启蒙",
                "黑色幽默防御",
                "随机性接受"
            ];

            // 每个模型显示1秒，总共7秒
            const modelDuration = 1;
            const totalDuration = models.length * modelDuration;

            // 计算当前应该显示哪个模型
            const currentIndex = Math.floor(sprite.elapsed / modelDuration);
            const modelProgress = (sprite.elapsed % modelDuration) / modelDuration;

            // 当前模型的透明度
            const currentOpacity = interpolate(modelProgress, [0, 0.3, 0.7, 1], [0, 1, 1, 0], Easing.easeInOut);
            const currentY = interpolate(modelProgress, [0, 0.3, 0.7, 1], [20, 0, 0, -20], Easing.easeOut);

            return (
                <div className="mind-model-container">
                    {models.map((model, index) => {
                        if (index === currentIndex) {
                            return (
                                <div
                                    key={index}
                                    className={`mind-model ${index === 0 || index === 2 || index === 6 ? 'highlight' : ''}`}
                                    style={{
                                        opacity: currentOpacity,
                                        transform: `translateY(${currentY}px)`,
                                        transition: 'opacity 0.5s ease, transform 0.5s ease'
                                    }}
                                >
                                    {model}
                                </div>
                            );
                        }
                        return null;
                    })}
                </div>
            );
        }

        function Quote() {
            const sprite = useSprite();
            const opacity = interpolate(sprite.t, [0, 0.3, 0.7, 1], [0, 1, 1, 0], Easing.easeInOut);
            const y = interpolate(sprite.t, [0, 0.3, 0.7, 1], [20, 0, 0, -20], Easing.easeOut);

            return (
                <div style={{
                    position: 'absolute',
                    top: '50%',
                    left: '50%',
                    transform: `translate(-50%, -50%) translateY(${y}px)`,
                    opacity,
                    transition: 'opacity 0.5s ease, transform 0.5s ease'
                }}>
                    <div className="quote-container">
                        <div className="quote">
                            <span className="quote-quote">"</span>
                            我插队时一天干12小时，但那是在地里，身体累心不累。你们现在坐在电脑前12小时，身体没动心先死了。
                            <span className="quote-quote">"</span>
                        </div>
                    </div>
                </div>
            );
        }

        function Ending() {
            const sprite = useSprite();
            const opacity = interpolate(sprite.t, [0, 0.3, 0.7, 1], [0, 1, 1, 0], Easing.easeInOut);
            const scale = interpolate(sprite.t, [0, 0.3, 0.7, 1], [0.9, 1, 1, 0.9], Easing.easeOut);

            return (
                <div style={{
                    position: 'absolute',
                    top: '50%',
                    left: '50%',
                    transform: `translate(-50%, -50%) scale(${scale})`,
                    opacity,
                    transition: 'opacity 0.5s ease, transform 0.5s ease'
                }}>
                    <div className="ending">
                        从'荒诞逻辑'到'边缘生存'的反抗之路
                    </div>
                </div>
            );
        }

        function WangErAnimation() {
            return (
                <Stage duration={15} width={800} height={450} bgColor="#000" loop={true}>
                    <Sprite start={0} end={2}>
                        <Title />
                    </Sprite>
                    <Sprite start={2} end={4}>
                        <Subtitle />
                    </Sprite>
                    <Sprite start={4} end={11}>
                        <MindModels />
                    </Sprite>
                    <Sprite start={11} end={13}>
                        <Quote />
                    </Sprite>
                    <Sprite start={13} end={15}>
                        <Ending />
                    </Sprite>
                </Stage>
            );
        }

        ReactDOM.render(<WangErAnimation />, document.getElementById('root'));
    </script>
</body>
</html>
